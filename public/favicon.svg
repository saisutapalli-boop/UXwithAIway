<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Background: Hitachi Red rounded square -->
  <rect width="40" height="40" rx="9" fill="#b1000e"/>
  <!-- U shape = User / UX (bold stroke) -->
  <path d="M9 9 L9 22 Q9 32 20 32 Q31 32 31 22 L31 9"
        stroke="white" stroke-width="4.5"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- AI Neural Network: triangle of connected nodes inside the U -->
  <line x1="14.5" y1="18.5" x2="25.5" y2="18.5"
        stroke="rgba(255,255,255,0.55)" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="14.5" y1="18.5" x2="20" y2="26.5"
        stroke="rgba(255,255,255,0.55)" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="25.5" y1="18.5" x2="20" y2="26.5"
        stroke="rgba(255,255,255,0.55)" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Nodes -->
  <circle cx="14.5" cy="18.5" r="2.3" fill="white"/>
  <circle cx="25.5" cy="18.5" r="2.3" fill="white"/>
  <circle cx="20"   cy="26.5" r="2.3" fill="white"/>
</svg>
